name: taskease
description: Smart Task Manager with Notes
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.2
  table_calendar: ^3.1.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  signature: ^5.5.0
  image_picker: ^1.0.7
  permission_handler: ^11.0.0
  # workmanager: ^0.5.0   ← REMOVE THIS LINE

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/